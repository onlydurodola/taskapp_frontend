name: Frontend CI

# Trigger on pushes to main and pull requests, only when frontend files change
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'index.html'
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: VALIDATE – Lint and type check (fast feedback)
  # ═══════════════════════════════════════════════════════════
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  # ═══════════════════════════════════════════════════════════
  # JOB 2: TEST – Run unit/integration tests (if any)
  # ═══════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate   # Only run if validation passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test           # Assumes test script exists; if none, skip this job

  # ═══════════════════════════════════════════════════════════
  # JOB 3: BUILD – Create production bundle and upload artifact
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build Production Artifact
    runs-on: ubuntu-latest
    needs: [validate, test]   # Wait for both

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_API_URL: https://api.devops-tsacademy.com/api   # Set your backend API URL
          NODE_ENV: production
        run: npm run build

      - name: Create tarball
        run: tar -czf frontend.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: frontend.tar.gz
          retention-days: 7